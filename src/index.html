<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全民战疫</title>
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <div id="stage" class="col-12 col-xl-4 offset-xl-4"></div>
    </div>
    <div class="mask_bg"></div>

    <!-- 模态框 -->
    <div class="modal fade" id="modal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <ul class="list-group" id="showMessage"></ul>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-success" data-bs-dismiss="modal">我知道了</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 音频文件 -->
  <audio id="audio-button" hidden preload="auto"><source type="audio/mpeg"></audio>
  <audio id="audio-start" hidden preload="auto"><source type="audio/mpeg"></audio>
  <audio id="audio-bgMusic" hidden loop preload="auto"><source type="audio/mpeg"></audio>
  <audio id="audio-shot" hidden preload="auto"><source type="audio/mpeg"></audio>
  <audio id="audio-killed" hidden preload="auto"><source type="audio/mpeg"></audio>
  <audio id="audio-gameOver" hidden preload="auto"><source type="audio/mpeg"></audio>

  <script type="module" src="./game/index.ts"></script>
</body>

</html>
